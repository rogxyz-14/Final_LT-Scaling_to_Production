# This file tells GitHub: "Every time someone pushes code, do these things."

name: CI Pipeline           # The name you'll see in the GitHub Actions tab

# WHEN should this run?
on:
  push:                     # Run when code is pushed...
    branches: [main]        # ...to the main branch
  pull_request:             # Also run on pull requests
    branches: [main]

# WHAT should it do?
jobs:
  check-code:
    name: Lint and Test
    runs-on: ubuntu-latest  # Use a Linux machine provided by GitHub

    steps:
      # Step 1: Download your code onto the runner
      - name: Get the code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install your packages (pip install)
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Check code style
      - name: Check code style (lint)
        run: flake8 app/

      # Step 5: Run tests
      - name: Run tests
        run: pytest tests/

  # This job runs AFTER "check-code" passes
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: check-code
    if: github.event_name == 'push'  # Only build on push, not on PRs

    # Give this job permission to push images
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Download the code
      - name: Get the code
        uses: actions/checkout@v4

      # Step 2: Log in to GitHub's container registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}           # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}   # Auto-provided by GitHub

      # Step 3: Build and push the Docker image
      - name: Build and push
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest

      # Step 4: Verify image was created
      - name: Verify image was pushed
        run: docker images | grep ghcr.io